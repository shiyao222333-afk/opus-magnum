<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240" role="img" aria-label="OpusMagnum 巨作 logo">
  <defs>
    <radialGradient id="omBg" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#2a1b4d"/>
      <stop offset="100%" stop-color="#0e0a1f"/>
    </radialGradient>
    <radialGradient id="omStone" cx="50%" cy="36%" r="68%">
      <stop offset="0%" stop-color="#fbeeff"/>
      <stop offset="45%" stop-color="#c9a6ff"/>
      <stop offset="100%" stop-color="#7b3ff2"/>
    </radialGradient>
    <linearGradient id="omBlack" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7a7a98"/><stop offset="100%" stop-color="#1c1c2b"/>
    </linearGradient>
    <linearGradient id="omWhite" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#c7d2e8"/>
    </linearGradient>
    <linearGradient id="omYellow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe9a8"/><stop offset="100%" stop-color="#e0a93b"/>
    </linearGradient>
    <linearGradient id="omRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff9d8a"/><stop offset="100%" stop-color="#d63b2f"/>
    </linearGradient>
    <filter id="omGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="240" height="240" rx="44" fill="url(#omBg)"/>

  <!-- rotating dashed gear ring -->
  <g opacity="0.30" stroke="#b79bf0" stroke-width="3" fill="none">
    <circle cx="120" cy="120" r="104" stroke-dasharray="5 11">
      <animateTransform attributeName="transform" type="rotate" from="0 120 120" to="360 120 120" dur="46s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- four converging streams: white(top)/red(right)/yellow(bottom)/black(left) -->
  <g filter="url(#omGlow)" stroke-linecap="round" fill="none" stroke-width="6">
    <path d="M120 24 C 120 58, 120 70, 120 96" stroke="url(#omWhite)">
      <animate attributeName="opacity" values="0.35;1;0.35" dur="3.0s" repeatCount="indefinite"/>
    </path>
    <path d="M216 120 C 182 120, 170 120, 144 120" stroke="url(#omRed)">
      <animate attributeName="opacity" values="1;0.35;1" dur="3.0s" repeatCount="indefinite"/>
    </path>
    <path d="M120 216 C 120 182, 120 170, 120 144" stroke="url(#omYellow)">
      <animate attributeName="opacity" values="0.35;1;0.35" dur="2.4s" repeatCount="indefinite"/>
    </path>
    <path d="M24 120 C 58 120, 70 120, 96 120" stroke="url(#omBlack)">
      <animate attributeName="opacity" values="1;0.35;1" dur="2.4s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- philosopher's stone (pulsing gem at center) -->
  <g filter="url(#omGlow)">
    <polygon points="120,76 152,98 152,142 120,164 88,142 88,98" fill="url(#omStone)" stroke="#ffffff" stroke-width="2"/>
    <polygon points="120,90 138,104 138,136 120,150 102,136 102,104" fill="#ffffff" opacity="0.16"/>
    <animateTransform attributeName="transform" type="scale" values="1;1.06;1" additive="sum" dur="3.6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" keyTimes="0;0.5;1"/>
  </g>

  <text x="120" y="202" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#e9defb" letter-spacing="1.5">OPUS·MAGNUM</text>
</svg>
